---
# ==============================================================================
# FASE 1: PREPARAR EL SERVIDOR DE LOGS REMOTO (Crear usuario admin_Logs)
# ==============================================================================
- name: Bootstrap - Crear usuario administrador específico en el Servidor de Logs
  hosts: servidor_logs
  become: true
  gather_facts: false
  vars:
    ansible_user: "{{ ansible_user_inicial }}"
    ansible_ssh_private_key_file: "{{ ansible_ssh_private_key_file_inicial }}"
  
  tasks:
    - name: Asegurar que el grupo del nuevo administrador existe
      group:
        name: "{{ nuevo_usuario_admin }}"
        state: present

    - name: Crear el usuario admin_Logs con bash por defecto
      user:
        name: "{{ nuevo_usuario_admin }}"
        group: "{{ nuevo_usuario_admin }}"
        shell: /bin/bash
        state: present

    - name: Configurar SUDO sin contraseña para admin_Logs
      copy:
        dest: "/etc/sudoers.d/{{ nuevo_usuario_admin }}"
        content: "{{ nuevo_usuario_admin }} ALL=(ALL) NOPASSWD:ALL"
        validate: '/usr/sbin/visudo -cf %s'
        owner: root
        group: root
        mode: '0440'

    - name: Desplegar la clave pública SSH para permitir acceso sin contraseña
      authorized_key:
        user: "{{ nuevo_usuario_admin }}"
        state: present
        key: "{{ lookup('file', clave_publica_nueva) }}"

# ==============================================================================
# FASE 2: INSTALACIÓN DE ELK EN EL SERVIDOR DE LOGS (Conectando como admin_Logs)
# ==============================================================================
- name: Configurar Servidor Central con Elasticsearch y Kibana 8.17.4 (100% Automático)
  hosts: servidor_logs
  become: true
  vars:
    ansible_user: "{{ nuevo_usuario_admin }}"
    ansible_ssh_private_key_file: "{{ clave_privada_nueva }}"
    elastic_version: "8.x"
    elastic_exact_version: "8.17.4"
    elastic_jvm_memory: "256m"
    elastic_entorno_password: "TuContrasenaSeguraAqui123!"

  tasks:
    - name: Actualizar caché de apt e instalar dependencias de Elastic
      apt:
        update_cache: yes
        name:
          - apt-transport-https
          - gnupg
          - wget
        state: present

    - name: Descargar clave GPG de Elastic
      get_url:
        url: https://artifacts.elastic.co/GPG-KEY-elasticsearch
        dest: /usr/share/keyrings/elasticsearch-keyring.asc
        mode: '0644'

    - name: Convertir clave GPG al formato de keyring de Ubuntu
      command: gpg --dearmor -o /usr/share/keyrings/elasticsearch-keyring.gpg /usr/share/keyrings/elasticsearch-keyring.asc
      args:
        creates: /usr/share/keyrings/elasticsearch-keyring.gpg

    - name: Añadir repositorio oficial de Elastic
      apt_repository:
        repo: "deb [signed-by=/usr/share/keyrings/elasticsearch-keyring.gpg] https://artifacts.elastic.co/packages/{{ elastic_version }}/apt stable main"
        state: present
        filename: elastic-8.x

    - name: Ajustar vm.max_map_count de forma inmediata antes de instalar el paquete
      sysctl:
        name: vm.max_map_count
        value: '262144'
        state: present
        reload: yes

    - name: Instalar exactamente Elasticsearch y Kibana 8.17.4
      apt:
        update_cache: yes
        name:
          - "elasticsearch={{ elastic_exact_version }}"
          - "kibana={{ elastic_exact_version }}"
        state: present
        force: yes

    - name: Limitar la memoria JVM de Elasticsearch para evitar caídas
      copy:
        dest: /etc/elasticsearch/jvm.options.d/memory.options
        content: |
          -Xms{{ elastic_jvm_memory }}
          -Xmx{{ elastic_jvm_memory }}
        owner: root
        group: elasticsearch
        mode: '0644'

    - name: Configurar Elasticsearch para escuchar en toda la red
      lineinfile:
        path: /etc/elasticsearch/elasticsearch.yml
        regexp: '^#?network.host:'
        line: 'network.host: 0.0.0.0'

    - name: Recargar systemd y arrancar Elasticsearch
      systemd:
        daemon_reload: yes
        name: elasticsearch
        enabled: yes
        state: started

    - name: Esperar a que Elasticsearch esté listo (puerto 9200)
      wait_for:
        port: 9200
        timeout: 60

    - name: Establecer la contraseña fija del usuario 'elastic'
      command: "/usr/share/elasticsearch/bin/elasticsearch-reset-password -u elastic -b -i"
      args:
        stdin: "{{ elastic_entorno_password }}\n{{ elastic_entorno_password }}"

    - name: Copiar el certificado CA de Elasticsearch a la carpeta de Kibana
      copy:
        src: /etc/elasticsearch/certs/http_ca.crt
        dest: /etc/kibana/elasticsearch-ca.crt
        remote_src: yes
        owner: root
        group: kibana
        mode: '0660'

    - name: Forzar la configuración directa en kibana.yml (Saltar Asistente de Tokens)
      blockinfile:
        path: /etc/kibana/kibana.yml
        marker: "# {mark} ANSIBLE CONFIG DIRECTA"
        block: |
          server.host: "0.0.0.0"
          elasticsearch.hosts: ["https://localhost:9200"]
          elasticsearch.username: "kibana_system"
          elasticsearch.ssl.certificateAuthorities: [ "/etc/kibana/elasticsearch-ca.crt" ]

    - name: Generar contraseña fija para el usuario interno kibana_system
      command: "/usr/share/elasticsearch/bin/elasticsearch-reset-password -u kibana_system -b -i"
      args:
        stdin: "{{ elastic_entorno_password }}\n{{ elastic_entorno_password }}"

    - name: Inyectar la contraseña de kibana_system en el keystore seguro de Kibana
      shell: |
        echo "{{ elastic_entorno_password }}" | /usr/share/kibana/bin/kibana-keystore add elasticsearch.password --force --stdin
      no_log: true

    - name: Reiniciar el servicio de Kibana para aplicar la configuración directa
      systemd:
        name: kibana
        enabled: yes
        state: restarted

    # CORRECCIÓN: Validamos el estado real interno de la API (Status 200) en lugar de solo mirar el puerto bruto
    - name: Esperar activamente a que la API interna de Kibana responda con éxito (Evitar error 503)
      uri:
        url: "http://localhost:5601/api/status"
        status_code: 200
      register: kibana_api_check
      until: kibana_api_check.status == 200
      retries: 30
      delay: 5

    - name: Obtener el certificado CA de Elasticsearch para los clientes
      slurp:
        src: /etc/elasticsearch/certs/http_ca.crt
      register: elastic_ca_cert

# ==============================================================================
# FASE 3: INSTALAR AUDITBEAT EN EL PROPIO SERVIDOR WEB LOCAL
# ==============================================================================
- name: Configurar Servidor Web Local con Auditbeat 8.17.4
  hosts: servidor_web_sftp
  become: true
  vars:
    elasticsearch_server_ip: "{{ hostvars['servidor_logs']['ansible_host'] }}"
    elastic_exact_version: "8.17.4"
    elastic_password_client: "TuContrasenaSeguraAqui123!"

  tasks:
    - name: Instalar dependencias previas localmente
      apt:
        update_cache: yes
        name: [apt-transport-https, gnupg, wget]
        state: present

    - name: Asegurar clave GPG de Elastic local
      get_url:
        url: https://artifacts.elastic.co/GPG-KEY-elasticsearch
        dest: /usr/share/keyrings/elasticsearch-keyring.asc

    - name: Convertir GPG local
      command: gpg --dearmor -o /usr/share/keyrings/elasticsearch-keyring.gpg /usr/share/keyrings/elasticsearch-keyring.asc
      args:
        creates: /usr/share/keyrings/elasticsearch-keyring.gpg

    - name: Añadir repositorio local
      apt_repository:
        repo: "deb [signed-by=/usr/share/keyrings/elasticsearch-keyring.gpg] https://artifacts.elastic.co/packages/8.x/apt stable main"
        state: present
        filename: elastic-8.x

    - name: Instalar Auditbeat local
      apt:
        name: "auditbeat={{ elastic_exact_version }}"
        state: present
        force: yes

    - name: Asegurar que el directorio de datos de Auditbeat existe de forma limpia
      file:
        path: /var/lib/auditbeat
        state: directory
        owner: root
        group: root
        mode: '0750'

    - name: Copiar el certificado CA generado por el servidor de logs al entorno local
      copy:
        content: "{{ hostvars['servidor_logs']['elastic_ca_cert']['content'] | b64decode }}"
        dest: /etc/auditbeat/elasticsearch-ca.crt
        owner: root
        group: root
        mode: '0644'

    - name: Configurar salida ordenada de Auditbeat hacia el Elasticsearch Central
      blockinfile:
        path: /etc/auditbeat/auditbeat.yml
        marker: "# {mark} ANSIBLE MANAGED BLOCK"
        block: |
          output.elasticsearch:
            hosts: ["https://{{ elasticsearch_server_ip }}:9200"]
            username: "elastic"
            password: "{{ elastic_password_client }}"
            ssl.certificate_authorities: ["/etc/auditbeat/elasticsearch-ca.crt"]
          setup.kibana:
            host: "http://{{ elasticsearch_server_ip }}:5601"

    - name: "Cargar Data Views y Dashboards ANTES de iniciar el servicio daemon"
      command: auditbeat setup

    - name: Habilitar y arrancar Auditbeat local (Fase Final)
      systemd:
        name: auditbeat
        enabled: yes
        state: restarted
